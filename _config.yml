# =============================================================
# Site Settings
# =============================================================
title: "Dr. Deepak Waman"
name: "Deepak Waman"
description: "Postdoctoral Researcher in Cloud Microphysics | Karlsruhe Institute of Technology"
url: "https://deepak-waman.github.io"
baseurl: ""
repository: "Deepak-Waman/Deepak-Waman.github.io"

# =============================================================
# Theme
# =============================================================
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default"   # options: air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

# =============================================================
# Author Info
# =============================================================
author:
  name: "Dr. Deepak Waman"
  avatar: "/assets/images/profile.jpg"
  bio: "Postdoctoral researcher in cloud microphysics and ice nucleation at KIT, Germany. Working on ICON model development and aerosol-cloud-radiation interactions."
  location: "Karlsruhe, Germany"
  employer: "Karlsruhe Institute of Technology"
  email: "deepak.waman@kit.edu"
  links:
    - label: "ORCID"
      icon: "fab fa-orcid"
      url: "https://orcid.org/0000-0001-8640-648X"
    - label: "ResearchGate"
      icon: "fab fa-researchgate"
      url: "https://www.researchgate.net/profile/Deepak_Waman2"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/deepak-waman-1b7490197/"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/Deepak-Waman"

# =============================================================
# Site Footer
# =============================================================
footer:
  links:
    - label: "ORCID"
      icon: "fab fa-orcid"
      url: "https://orcid.org/0000-0001-8640-648X"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/Deepak-Waman"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/deepak-waman-1b7490197/"

# =============================================================
# Reading Files
# =============================================================
include:
  - .htaccess
  - _pages

# =============================================================
# Plugins
# =============================================================
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# =============================================================
# Navigation
# =============================================================
navigation:
  main:
    - title: "Home"
      url: /
    - title: "Research"
      url: /research/
    - title: "Publications"
      url: /publications/
    - title: "Projects"
      url: /projects/
    - title: "Contact"
      url: /contact/

# =============================================================
# Defaults
# =============================================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# =============================================================
# Encoding
# =============================================================
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false
